# fly.toml app configuration file generated for kwleo-spending-bot on 2026-03-09T04:55:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'leoandjane-bot'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
